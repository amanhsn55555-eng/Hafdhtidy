<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>المحفظة • منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tajawal', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #f8fafc;
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
      -webkit-tap-highlight-color: transparent;
    }

    /* ========== هيدر المحفظة ========== */
    .wallet-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(251, 191, 36, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wallet-header h2 {
      font-size: 20px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wallet-header h2 i {
      color: #fbbf24;
    }

    .back-btn {
      cursor: pointer;
      color: #94a3b8;
      font-size: 20px;
      transition: all 0.2s;
    }

    .back-btn:hover {
      color: #fbbf24;
    }

    /* ========== عرض الأرصدة ========== */
    .balances-container {
      margin-top: 65px;
      padding: 16px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .balance-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .balance-card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 20px;
      padding: 18px 12px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .balance-card.gold { border-bottom: 3px solid #fbbf24; }
    .balance-card.elixir { border-bottom: 3px solid #a78bfa; }
    .balance-card.money { border-bottom: 3px solid #34d399; }
    .balance-card.oil { border-bottom: 3px solid #2dd4bf; }

    .card-icon {
      width: 45px;
      height: 45px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 22px;
    }

    .gold .card-icon { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
    .elixir .card-icon { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }
    .money .card-icon { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .oil .card-icon { background: rgba(45, 212, 191, 0.15); color: #2dd4bf; }

    .card-value {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .card-label {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 600;
    }

    /* ========== قسم السحب ========== */
    .withdraw-section {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 25px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 16px;
      font-weight: 700;
      color: #ef4444;
    }

    .withdraw-info {
      background: rgba(239, 68, 68, 0.1);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 20px;
      border-right: 3px solid #ef4444;
    }

    .withdraw-info p {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .withdraw-info p:last-child {
      margin-bottom: 0;
    }

    .withdraw-info i {
      color: #ef4444;
    }

    .withdraw-input-wrapper {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      padding: 5px 15px;
      border: 1px solid rgba(239, 68, 68, 0.3);
      margin-bottom: 15px;
    }

    .withdraw-input-wrapper i {
      color: #ef4444;
      margin-left: 10px;
    }

    .withdraw-input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 0;
      color: white;
      font-size: 16px;
      font-weight: 600;
      outline: none;
      direction: rtl;
    }

    .withdraw-input-wrapper input::placeholder {
      color: #475569;
    }

    .withdraw-input-wrapper span {
      color: #ef4444;
      font-weight: 700;
      margin-right: 10px;
    }

    .quick-withdraw {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .quick-withdraw-btn {
      flex: 1;
      padding: 10px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      color: #ef4444;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .quick-withdraw-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .withdraw-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none;
      color: white;
      padding: 16px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .withdraw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
    }

    .withdraw-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ========== قسم التحويل ========== */
    .exchange-section {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 25px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(251, 191, 36, 0.1);
    }

    .exchange-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .exchange-tab {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 13px;
    }

    .exchange-tab.active {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
      border-color: transparent;
    }

    .exchange-form {
      display: none;
    }

    .exchange-form.active {
      display: block;
    }

    .exchange-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .exchange-from, .exchange-to {
      flex: 1;
    }

    .exchange-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #94a3b8;
    }

    .exchange-input-wrapper {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      padding: 5px 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .exchange-input-wrapper i {
      color: #fbbf24;
      margin-left: 10px;
    }

    .exchange-input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 14px 0;
      color: white;
      font-size: 16px;
      font-weight: 600;
      outline: none;
      direction: rtl;
    }

    .exchange-arrow {
      color: #fbbf24;
      font-size: 20px;
    }

    .rate-info {
      background: rgba(251, 191, 36, 0.08);
      border-radius: 15px;
      padding: 12px 15px;
      margin-bottom: 20px;
      font-size: 13px;
      border-right: 3px solid #fbbf24;
    }

    .exchange-btn {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border: none;
      color: #0f172a;
      padding: 16px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    /* ========== أسعار الصرف ========== */
    .rates-section {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 25px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .rates-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .rate-item {
      text-align: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 15px;
    }

    .rate-item .from {
      color: #34d399;
      font-weight: 700;
    }

    .rate-item .to {
      color: #94a3b8;
      font-size: 13px;
      margin: 5px 0;
    }

    .rate-item .value {
      font-weight: 800;
      font-size: 18px;
    }

    .rate-item .value.gold { color: #fbbf24; }
    .rate-item .value.elixir { color: #a78bfa; }
    .rate-item .value.oil { color: #2dd4bf; }

    .fee-warning {
      margin-top: 15px;
      padding: 10px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 12px;
      color: #ef4444;
      font-size: 12px;
      text-align: center;
      border: 1px dashed #ef4444;
    }

    /* ========== سجل العمليات ========== */
    .history-section {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 25px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .history-tabs {
      display: flex;
      gap: 8px;
    }

    .history-tab {
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-tab.active {
      background: #fbbf24;
      color: #0f172a;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-icon {
      width: 45px;
      height: 45px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .history-icon.buy { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .history-icon.sell { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .history-icon.withdraw { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

    .history-details {
      flex: 1;
    }

    .history-title {
      font-weight: 600;
      margin-bottom: 3px;
    }

    .history-time {
      font-size: 11px;
      color: #64748b;
    }

    .history-amounts {
      text-align: left;
    }

    .history-from {
      color: #ef4444;
      font-weight: 600;
    }

    .history-to {
      color: #34d399;
      font-weight: 600;
    }

    .empty-history {
      text-align: center;
      padding: 30px;
      color: #64748b;
    }

    /* ========== نافذة تأكيد السحب ========== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 4000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-sheet {
      background: #1e293b;
      width: 100%;
      max-width: 380px;
      border-radius: 30px;
      padding: 25px 20px;
      margin: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .modal-header h3 {
      font-size: 20px;
      font-weight: 800;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: white;
    }

    .withdraw-summary {
      background: rgba(239, 68, 68, 0.1);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      text-align: center;
    }

    .withdraw-summary .amount {
      font-size: 42px;
      font-weight: 800;
      color: #ef4444;
    }

    .withdraw-summary .label {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 5px;
    }

    .btn-confirm-withdraw {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 16px;
      width: 100%;
      cursor: pointer;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 18px;
      font-weight: 600;
      font-size: 14px;
      width: 100%;
      cursor: pointer;
      margin-top: 10px;
    }

    /* ========== إشعار ========== */
    #toastMsg {
      position: fixed;
      bottom: 30px;
      left: 20px;
      right: 20px;
      background: #1e293b;
      color: white;
      padding: 14px 20px;
      border-radius: 50px;
      text-align: center;
      z-index: 5000;
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
      max-width: 400px;
      margin: 0 auto;
      font-weight: 600;
    }

    #toastMsg.show {
      opacity: 1;
      bottom: 40px;
    }

    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px;
    }

    .loading-spinner i {
      font-size: 35px;
      color: #fbbf24;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="wallet-header">
  <div class="back-btn" onclick="goBack()">
    <i class="fas fa-arrow-right"></i>
  </div>
  <h2><i class="fas fa-wallet"></i> المحفظة</h2>
  <div style="width: 24px;"></div>
</div>

<div class="balances-container" id="walletContainer">
  <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
</div>

<!-- نافذة تأكيد السحب -->
<div class="modal-overlay" id="withdrawConfirmModal">
  <div class="modal-sheet">
    <div class="modal-header">
      <h3><i class="fas fa-hand-holding-usd"></i> تأكيد السحب</h3>
      <button class="close-btn" onclick="closeWithdrawModal()">&times;</button>
    </div>
    
    <div class="withdraw-summary">
      <div class="amount" id="withdrawAmountDisplay">0</div>
      <div class="label">عملة TMX</div>
    </div>
    
    <p style="color: #94a3b8; text-align: center; margin-bottom: 20px; font-size: 14px;">
      سيتم خصم المبلغ من رصيدك مباشرة
    </p>
    
    <button class="btn-confirm-withdraw" onclick="confirmWithdraw()">
      <i class="fas fa-check"></i> تأكيد السحب
    </button>
    <button class="btn-cancel" onclick="closeWithdrawModal()">
      <i class="fas fa-times"></i> إلغاء
    </button>
  </div>
</div>

<div id="toastMsg"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, onSnapshot, addDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCPBrZMo6IYCwCDYV3HEfNcUmLUITR6VRc",
  authDomain: "elahbes.firebaseapp.com",
  projectId: "elahbes",
  storageBucket: "elahbes.firebasestorage.app",
  messagingSenderId: "800207969145",
  appId: "1:800207969145:web:aa19b725d1c92dd48fada8",
  measurementId: "G-EFT566SJMP"
};

  const MIN_WITHDRAW = 500;
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const EXCHANGE_RATES = {
    toGold: { rate: 2, name: 'ذهب', icon: 'fa-coins', color: '#fbbf24' },
    toElixir: { rate: 3, name: 'إكسير', icon: 'fa-flask', color: '#a78bfa' },
    toOil: { rate: 1.4, name: 'نفط', icon: 'fa-oil-can', color: '#2dd4bf' }
  };

  const SELL_FEE = 0.5;

  let currentUser = null;
  let currentUserData = null;
  let resources = { gold: 0, elixir: 0, money: 0, oil: 0 };
  let transactions = [];
  let currentTab = 'buy';
  let historyFilter = 'all';
  let pendingWithdrawAmount = 0;

  function showToast(msg, isSuccess = true) {
    const t = document.getElementById('toastMsg');
    if (!t) return;
    t.textContent = msg;
    t.style.background = isSuccess ? '#10b981' : '#ef4444';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // تعديل دالة الرجوع - بدون توجيه لصفحة 404
  window.goBack = function() {
    // محاولة الرجوع للصفحة السابقة في المتصفح
    if (document.referrer && document.referrer.includes(window.location.hostname)) {
      window.history.back();
    } else {
      // إذا لم توجد صفحة سابقة، عرض رسالة
      showToast('لا توجد صفحة سابقة للرجوع إليها');
    }
  };

  function formatNumber(num) {
    return num?.toLocaleString('ar-SA') || '0';
  }

  async function loadUserData(uid) {
    try {
      const resourcesDoc = await getDoc(doc(db, "resources", uid));
      if (resourcesDoc.exists()) {
        resources = resourcesDoc.data();
      } else {
        resources = { gold: 10, elixir: 10, money: 10000, oil: 10 };
        await setDoc(doc(db, "resources", uid), resources);
      }
      
      const walletDoc = await getDoc(doc(db, "wallets", uid));
      if (walletDoc.exists()) {
        transactions = walletDoc.data().transactions || [];
      }
      
      renderWallet();
    } catch (error) {
      console.error("خطأ في تحميل البيانات:", error);
    }
  }

  function calculateBuyAmount(moneyAmount, resourceType) {
    return moneyAmount * (EXCHANGE_RATES[resourceType]?.rate || 1);
  }

  function calculateSellAmount(resourceAmount, resourceType) {
    const rate = EXCHANGE_RATES[resourceType]?.rate || 1;
    const moneyValue = resourceAmount / rate;
    return Math.floor(moneyValue * SELL_FEE);
  }

  function renderWallet() {
    const container = document.getElementById('walletContainer');
    if (!container) return;
    
    const filteredTransactions = transactions.filter(t => {
      if (historyFilter === 'all') return true;
      return t.type === historyFilter;
    });
    
    container.innerHTML = `
      <!-- بطاقات الأرصدة -->
      <div class="balance-cards">
        <div class="balance-card gold">
          <div class="card-icon"><i class="fas fa-coins"></i></div>
          <div class="card-value">${formatNumber(resources.gold || 0)}</div>
          <div class="card-label">ذهب</div>
        </div>
        <div class="balance-card elixir">
          <div class="card-icon"><i class="fas fa-flask"></i></div>
          <div class="card-value">${formatNumber(resources.elixir || 0)}</div>
          <div class="card-label">إكسير</div>
        </div>
        <div class="balance-card money">
          <div class="card-icon"><i class="fas fa-money-bill"></i></div>
          <div class="card-value">${formatNumber(resources.money || 0)}</div>
          <div class="card-label">TMX</div>
        </div>
        <div class="balance-card oil">
          <div class="card-icon"><i class="fas fa-oil-can"></i></div>
          <div class="card-value">${formatNumber(resources.oil || 0)}</div>
          <div class="card-label">نفط</div>
        </div>
      </div>
      
      <!-- قسم السحب -->
      <div class="withdraw-section">
        <div class="section-title">
          <i class="fas fa-hand-holding-usd"></i>
          <span>سحب الأموال</span>
        </div>
        
        <div class="withdraw-info">
          <p><i class="fas fa-info-circle"></i> الحد الأدنى للسحب: ${formatNumber(MIN_WITHDRAW)} عملة TMX</p>
          <p><i class="fas fa-check-circle"></i> سيتم خصم المبلغ من رصيدك مباشرة</p>
          <p><i class="fas fa-shield-alt"></i> معاملات آمنة ومشفرة</p>
        </div>
        
        <div class="quick-withdraw">
          <div class="quick-withdraw-btn" onclick="setWithdrawAmount(500)">500</div>
          <div class="quick-withdraw-btn" onclick="setWithdrawAmount(1000)">1,000</div>
          <div class="quick-withdraw-btn" onclick="setWithdrawAmount(5000)">5,000</div>
          <div class="quick-withdraw-btn" onclick="setWithdrawAmount(10000)">10,000</div>
        </div>
        
        <div class="withdraw-input-wrapper">
          <i class="fas fa-money-bill"></i>
          <input type="number" id="withdrawAmount" placeholder="أدخل المبلغ المراد سحبه" min="${MIN_WITHDRAW}" max="${resources.money || 0}" oninput="updateWithdrawButton()">
          <span>عملةTMX</span>
        </div>
        
        <button class="withdraw-btn" id="withdrawBtn" onclick="openWithdrawModal()" disabled>
          <i class="fas fa-hand-holding-usd"></i> سحب
        </button>
      </div>
      
      <!-- أسعار الصرف -->
      <div class="rates-section">
        <div class="section-title" style="color: #fbbf24;">
          <i class="fas fa-chart-line"></i>
          <span>أسعار الصرف (شراء)</span>
        </div>
        <div class="rates-grid">
          <div class="rate-item">
            <div class="from"><i class="fas fa-money-bill"></i> 5 TMX</div>
            <div class="to">→</div>
            <div class="value gold"><i class="fas fa-coins"></i> 10 ذهب</div>
          </div>
          <div class="rate-item">
            <div class="from"><i class="fas fa-money-bill"></i> 5 TMX</div>
            <div class="to">→</div>
            <div class="value elixir"><i class="fas fa-flask"></i> 15 إكسير</div>
          </div>
          <div class="rate-item">
            <div class="from"><i class="fas fa-money-bill"></i> 5 TMX</div>
            <div class="to">→</div>
            <div class="value oil"><i class="fas fa-oil-can"></i> 7 نفط</div>
          </div>
        </div>
        <div class="fee-warning">
          <i class="fas fa-exclamation-triangle"></i>
          تنبيه: عند بيع العملات للTMX يتم استقطاع 50% كرسوم تحويل
        </div>
      </div>
      
      <!-- قسم التحويل -->
      <div class="exchange-section">
        <div class="section-title" style="color: #fbbf24;">
          <i class="fas fa-exchange-alt"></i>
          <span>تحويل العملات</span>
        </div>
        
        <div class="exchange-tabs">
          <div class="exchange-tab ${currentTab === 'buy' ? 'active' : ''}" onclick="switchTab('buy')">
            <i class="fas fa-cart-plus"></i> شراء
          </div>
          <div class="exchange-tab ${currentTab === 'sell' ? 'active' : ''}" onclick="switchTab('sell')">
            <i class="fas fa-cart-arrow-down"></i> بيع
          </div>
        </div>
        
        <!-- نموذج الشراء -->
        <div class="exchange-form ${currentTab === 'buy' ? 'active' : ''}" id="buyForm">
          <div class="exchange-row">
            <div class="exchange-from">
              <label class="exchange-label">المبلغ (TMX)</label>
              <div class="exchange-input-wrapper">
                <i class="fas fa-money-bill"></i>
                <input type="number" id="buyMoneyAmount" placeholder="0" min="1" value="5" oninput="updateBuyPreview()">
              </div>
            </div>
          </div>
          
          <div class="rate-info" id="buyPreview">
            <i class="fas fa-info-circle"></i>
            <span>اختر العملة التي تريد شراءها</span>
          </div>
          
          <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="exchange-tab" style="flex:1;" id="buyGoldBtn" onclick="selectBuyResource('toGold')">
              <i class="fas fa-coins"></i> ذهب
            </button>
            <button class="exchange-tab" style="flex:1;" id="buyElixirBtn" onclick="selectBuyResource('toElixir')">
              <i class="fas fa-flask"></i> إكسير
            </button>
            <button class="exchange-tab" style="flex:1;" id="buyOilBtn" onclick="selectBuyResource('toOil')">
              <i class="fas fa-oil-can"></i> نفط
            </button>
          </div>
          
          <input type="hidden" id="selectedBuyResource" value="toGold">
          
          <button class="exchange-btn" onclick="executeBuy()">
            <i class="fas fa-cart-plus"></i> شراء
          </button>
        </div>
        
        <!-- نموذج البيع -->
        <div class="exchange-form ${currentTab === 'sell' ? 'active' : ''}" id="sellForm">
          <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="exchange-tab" style="flex:1;" id="sellGoldBtn" onclick="selectSellResource('gold')">
              <i class="fas fa-coins"></i> ذهب
            </button>
            <button class="exchange-tab" style="flex:1;" id="sellElixirBtn" onclick="selectSellResource('elixir')">
              <i class="fas fa-flask"></i> إكسير
            </button>
            <button class="exchange-tab" style="flex:1;" id="sellOilBtn" onclick="selectSellResource('oil')">
              <i class="fas fa-oil-can"></i> نفط
            </button>
          </div>
          
          <input type="hidden" id="selectedSellResource" value="gold">
          
          <div class="exchange-row">
            <div class="exchange-from">
              <label class="exchange-label" id="sellResourceLabel">الذهب</label>
              <div class="exchange-input-wrapper">
                <i class="fas fa-coins" id="sellResourceIcon"></i>
                <input type="number" id="sellAmount" placeholder="0" min="1" oninput="updateSellPreview()">
              </div>
              <small style="color: #64748b; margin-top: 5px; display: block;">
                المتاح: <span id="availableSellAmount">0</span>
              </small>
            </div>
          </div>
          
          <div class="rate-info" id="sellPreview">
            <i class="fas fa-info-circle"></i>
            <span>أدخل الكمية للبيع</span>
          </div>
          
          <button class="exchange-btn" onclick="executeSell()">
            <i class="fas fa-cart-arrow-down"></i> بيع
          </button>
        </div>
      </div>
      
      <!-- سجل العمليات -->
      <div class="history-section">
        <div class="history-header">
          <div class="section-title" style="color: #fbbf24;">
            <i class="fas fa-history"></i>
            <span>سجل العمليات</span>
          </div>
          <div class="history-tabs">
            <div class="history-tab ${historyFilter === 'all' ? 'active' : ''}" onclick="filterHistory('all')">الكل</div>
            <div class="history-tab ${historyFilter === 'buy' ? 'active' : ''}" onclick="filterHistory('buy')">شراء</div>
            <div class="history-tab ${historyFilter === 'sell' ? 'active' : ''}" onclick="filterHistory('sell')">بيع</div>
            <div class="history-tab ${historyFilter === 'withdraw' ? 'active' : ''}" onclick="filterHistory('withdraw')">سحب</div>
          </div>
        </div>
        
        ${filteredTransactions.length > 0 ? filteredTransactions.slice(0, 20).map(item => {
          if (item.type === 'buy' || item.type === 'sell') {
            return `
              <div class="history-item">
                <div class="history-icon ${item.type}">
                  <i class="fas fa-${item.type === 'buy' ? 'cart-plus' : 'cart-arrow-down'}"></i>
                </div>
                <div class="history-details">
                  <div class="history-title">
                    ${item.type === 'buy' ? 'شراء' : 'بيع'} ${item.resourceName || ''}
                  </div>
                  <div class="history-time">${item.createdAt ? new Date(item.createdAt).toLocaleString('ar-SA') : ''}</div>
                </div>
                <div class="history-amounts">
                  <span class="history-from">-${formatNumber(item.spent)} ${item.spentCurrency}</span>
                  <span style="color: #64748b;"> → </span>
                  <span class="history-to">+${formatNumber(item.received)} ${item.receivedCurrency}</span>
                </div>
              </div>
            `;
          } else if (item.type === 'withdraw') {
            return `
              <div class="history-item">
                <div class="history-icon withdraw">
                  <i class="fas fa-hand-holding-usd"></i>
                </div>
                <div class="history-details">
                  <div class="history-title">سحب TMX</div>
                  <div class="history-time">${item.createdAt ? new Date(item.createdAt).toLocaleString('ar-SA') : ''}</div>
                </div>
                <div class="history-amounts">
                  <span class="history-from">-${formatNumber(item.amount)} TMX</span>
                </div>
              </div>
            `;
          }
          return '';
        }).join('') : `
          <div class="empty-history">
            <i class="fas fa-exchange-alt" style="font-size: 40px; opacity: 0.3; margin-bottom: 10px;"></i>
            <p>لا توجد عمليات بعد</p>
          </div>
        `}
      </div>
    `;
    
    updateSellResourceInfo();
    updateBuyPreview();
  }

  window.setWithdrawAmount = (amount) => {
    const input = document.getElementById('withdrawAmount');
    if (input) {
      input.value = amount;
      updateWithdrawButton();
    }
  };

  window.updateWithdrawButton = () => {
    const amount = parseInt(document.getElementById('withdrawAmount')?.value) || 0;
    const btn = document.getElementById('withdrawBtn');
    if (btn) {
      btn.disabled = amount < MIN_WITHDRAW || amount > (resources.money || 0);
    }
  };

  window.openWithdrawModal = () => {
    const amount = parseInt(document.getElementById('withdrawAmount')?.value) || 0;
    if (amount < MIN_WITHDRAW) {
      showToast(`الحد الأدنى للسحب ${formatNumber(MIN_WITHDRAW)} عملة`, false);
      return;
    }
    if (amount > (resources.money || 0)) {
      showToast('رصيدك غير كافٍ', false);
      return;
    }
    
    pendingWithdrawAmount = amount;
    document.getElementById('withdrawAmountDisplay').textContent = formatNumber(amount);
    document.getElementById('withdrawConfirmModal').classList.add('active');
  };

  window.closeWithdrawModal = () => {
    document.getElementById('withdrawConfirmModal').classList.remove('active');
  };

  window.confirmWithdraw = async () => {
    if (!pendingWithdrawAmount || pendingWithdrawAmount < MIN_WITHDRAW) {
      showToast('المبلغ غير صالح', false);
      return;
    }
    
    if (pendingWithdrawAmount > (resources.money || 0)) {
      showToast('رصيدك غير كافٍ', false);
      return;
    }
    
    try {
      await updateDoc(doc(db, "resources", currentUser.uid), {
        money: increment(-pendingWithdrawAmount)
      });
      
      const transaction = {
        type: 'withdraw',
        amount: pendingWithdrawAmount,
        createdAt: Date.now()
      };
      
      const walletRef = doc(db, "wallets", currentUser.uid);
      const walletDoc = await getDoc(walletRef);
      if (walletDoc.exists()) {
        await updateDoc(walletRef, { transactions: arrayUnion(transaction) });
      } else {
        await setDoc(walletRef, { transactions: [transaction] });
      }
      
      resources.money -= pendingWithdrawAmount;
      transactions.push(transaction);
      
      closeWithdrawModal();
      renderWallet();
      showToast(`تم سحب ${formatNumber(pendingWithdrawAmount)} عملة TMX`, true);
      
    } catch (error) {
      console.error("خطأ في السحب:", error);
      showToast('فشل عملية السحب', false);
    }
  };

  window.filterHistory = (filter) => {
    historyFilter = filter;
    renderWallet();
  };

  window.switchTab = (tab) => {
    currentTab = tab;
    renderWallet();
  };

  window.selectBuyResource = (resource) => {
    document.getElementById('selectedBuyResource').value = resource;
    document.querySelectorAll('#buyGoldBtn, #buyElixirBtn, #buyOilBtn').forEach(btn => {
      btn.style.background = '';
      btn.style.color = '';
    });
    event.target.style.background = 'linear-gradient(135deg, #fbbf24, #f59e0b)';
    event.target.style.color = '#0f172a';
    updateBuyPreview();
  };

  window.selectSellResource = (resource) => {
    document.getElementById('selectedSellResource').value = resource;
    document.querySelectorAll('#sellGoldBtn, #sellElixirBtn, #sellOilBtn').forEach(btn => {
      btn.style.background = '';
      btn.style.color = '';
    });
    event.target.style.background = 'linear-gradient(135deg, #fbbf24, #f59e0b)';
    event.target.style.color = '#0f172a';
    updateSellResourceInfo();
    updateSellPreview();
  };

  function updateSellResourceInfo() {
    const resource = document.getElementById('selectedSellResource')?.value || 'gold';
    const names = { gold: 'الذهب', elixir: 'الإكسير', oil: 'النفط' };
    const icons = { gold: 'fa-coins', elixir: 'fa-flask', oil: 'fa-oil-can' };
    
    document.getElementById('sellResourceLabel').textContent = names[resource];
    document.getElementById('sellResourceIcon').className = `fas ${icons[resource]}`;
    document.getElementById('availableSellAmount').textContent = formatNumber(resources[resource] || 0);
  }

  window.updateBuyPreview = () => {
    const moneyAmount = parseFloat(document.getElementById('buyMoneyAmount')?.value) || 0;
    const resource = document.getElementById('selectedBuyResource')?.value || 'toGold';
    const resourceNames = { toGold: 'ذهب', toElixir: 'إكسير', toOil: 'نفط' };
    const received = calculateBuyAmount(moneyAmount, resource);
    
    document.getElementById('buyPreview').innerHTML = `
      <i class="fas fa-info-circle"></i>
      <span>${moneyAmount} TMX = ${received.toFixed(1)} ${resourceNames[resource]}</span>
    `;
  };

  window.updateSellPreview = () => {
    const amount = parseFloat(document.getElementById('sellAmount')?.value) || 0;
    const resource = document.getElementById('selectedSellResource')?.value || 'gold';
    const resourceNames = { gold: 'ذهب', elixir: 'إكسير', oil: 'نفط' };
    let resourceType = resource === 'gold' ? 'toGold' : resource === 'elixir' ? 'toElixir' : 'toOil';
    const moneyReceived = calculateSellAmount(amount, resourceType);
    
    document.getElementById('sellPreview').innerHTML = `
      <i class="fas fa-info-circle"></i>
      <span>${amount} ${resourceNames[resource]} = ${moneyReceived.toFixed(0)} TMX (بعد استقطاع 50%)</span>
    `;
  };

  window.executeBuy = async () => {
    const moneyAmount = parseFloat(document.getElementById('buyMoneyAmount')?.value) || 0;
    const resource = document.getElementById('selectedBuyResource')?.value || 'toGold';
    
    if (moneyAmount <= 0) { showToast('الرجاء إدخال مبلغ صحيح', false); return; }
    if (resources.money < moneyAmount) { showToast('رصيد المال غير كافٍ', false); return; }
    
    const resourceField = resource === 'toGold' ? 'gold' : resource === 'toElixir' ? 'elixir' : 'oil';
    const resourceName = resource === 'toGold' ? 'ذهب' : resource === 'toElixir' ? 'إكسير' : 'نفط';
    const received = calculateBuyAmount(moneyAmount, resource);
    
    try {
      const updates = {};
      updates.money = increment(-moneyAmount);
      updates[resourceField] = increment(received);
      
      await updateDoc(doc(db, "resources", currentUser.uid), updates);
      
      const transaction = {
        type: 'buy',
        spent: moneyAmount,
        spentCurrency: 'TMX',
        received: received,
        receivedCurrency: resourceName,
        resourceName: resourceName,
        createdAt: Date.now()
      };
      
      const walletRef = doc(db, "wallets", currentUser.uid);
      const walletDoc = await getDoc(walletRef);
      if (walletDoc.exists()) {
        await updateDoc(walletRef, { transactions: arrayUnion(transaction) });
      } else {
        await setDoc(walletRef, { transactions: [transaction] });
      }
      
      resources.money -= moneyAmount;
      resources[resourceField] = (resources[resourceField] || 0) + received;
      transactions.push(transaction);
      
      renderWallet();
      showToast(`تم شراء ${received.toFixed(1)} ${resourceName}`);
    } catch (e) {
      showToast('فشلت العملية', false);
    }
  };

  window.executeSell = async () => {
    const amount = parseFloat(document.getElementById('sellAmount')?.value) || 0;
    const resource = document.getElementById('selectedSellResource')?.value || 'gold';
    
    if (amount <= 0) { showToast('الرجاء إدخال كمية صحيحة', false); return; }
    if ((resources[resource] || 0) < amount) { showToast('رصيد غير كافٍ', false); return; }
    
    const resourceType = resource === 'gold' ? 'toGold' : resource === 'elixir' ? 'toElixir' : 'toOil';
    const resourceName = resource === 'gold' ? 'ذهب' : resource === 'elixir' ? 'إكسير' : 'نفط';
    const moneyReceived = calculateSellAmount(amount, resourceType);
    
    try {
      const updates = {};
      updates[resource] = increment(-amount);
      updates.money = increment(moneyReceived);
      
      await updateDoc(doc(db, "resources", currentUser.uid), updates);
      
      const transaction = {
        type: 'sell',
        spent: amount,
        spentCurrency: resourceName,
        received: moneyReceived,
        receivedCurrency: 'TMX',
        resourceName: resourceName,
        createdAt: Date.now()
      };
      
      const walletRef = doc(db, "wallets", currentUser.uid);
      const walletDoc = await getDoc(walletRef);
      if (walletDoc.exists()) {
        await updateDoc(walletRef, { transactions: arrayUnion(transaction) });
      } else {
        await setDoc(walletRef, { transactions: [transaction] });
      }
      
      resources[resource] -= amount;
      resources.money += moneyReceived;
      transactions.push(transaction);
      
      renderWallet();
      showToast(`تم بيع ${amount} ${resourceName} مقابل ${moneyReceived} TMX`);
    } catch (e) {
      showToast('فشلت العملية', false);
    }
  };

  // تعديل onAuthStateChanged - بدون توجيه لصفحة 404
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      currentUserData = (await getDoc(doc(db, "users", user.uid))).data();
      await loadUserData(user.uid);
    } else {
      // عرض رسالة بدلاً من التوجيه لصفحة غير موجودة
      const container = document.getElementById('walletContainer');
      if (container) {
        container.innerHTML = `
          <div style="text-align:center;padding:50px;color:#94a3b8;">
            <i class="fas fa-sign-in-alt" style="font-size:50px;opacity:0.3;margin-bottom:20px;"></i>
            <p>يرجى تسجيل الدخول للوصول إلى المحفظة</p>
          </div>
        `;
      }
    }
  });

  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('active'); });
  });
</script>
</body>
</html>
